<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mavurnek</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2e, #2b2b3c);
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #eee;
    }
    .container {
      width: 100%;
      height: 100%;
      background: rgba(20, 20, 30, 0.9);
      display: flex;
      flex-direction: column;
    }
    .centered {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    h2 {
      text-align: center;
      margin: 10px 0;
      color: #fff;
    }
    input, button {
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 15px;
    }
    input {
      background: #2f2f45;
      color: #fff;
      width: 240px;
      transition: background 0.2s;
    }
    input:focus {
      outline: none;
      background: #3d3d55;
    }
    input::placeholder {
      color: #aaa;
    }
    button {
      background: linear-gradient(135deg, #43a047, #66bb6a);
      color: white;
      cursor: pointer;
      font-weight: bold;
      width: 240px;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    #chat {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 10px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #444;
      padding: 10px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1e1e2e, #252537);
      display: flex;
      flex-direction: column;
    }
    .msg {
      margin: 8px 0;
      padding: 10px 14px;
      background: linear-gradient(135deg, #3c3c4e, #45455a);
      border-radius: 14px;
      max-width: 75%;
      word-wrap: break-word;
      position: relative;
      font-size: 14px;
    }
    .msg.self {
      background: linear-gradient(135deg, #4CAF50, #66bb6a);
      margin-left: auto;
      color: #fff;
    }
    .timestamp {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }
    .chat-controls {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }
    .chat-controls input {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Lock screen -->
    <div id="lock-screen" class="centered">
      <h2>Enter Access Code</h2>
      <input type="password" id="code" placeholder="Access code" />
      <button onclick="checkCode()">Unlock</button>
    </div>

    <!-- Username selection -->
    <div id="username-screen" class="centered" style="display:none;">
      <h2>Choose Username</h2>
      <input type="text" id="username" placeholder="Your username" />
      <button onclick="enterChat()">Enter Chat</button>
    </div>

    <!-- Chat screen -->
    <div id="chat">
      <h2>Messaging</h2>
      <div id="messages"></div>
      <div class="chat-controls">
        <input type="text" id="message" placeholder="Type a message" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    // SHA-256 helper
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Pre-hash the correct access code (replace with your own!)
    const correctHash = "e5c9af9ca13b9e9fff9cd82d8f8d07f75c45a83555540b24bdd40a59db29c685";

    async function checkCode() {
      const input = document.getElementById("code").value;
      const hash = await sha256(input);
      if (hash === correctHash) {
        document.getElementById("lock-screen").style.display = "none";
        document.getElementById("username-screen").style.display = "flex";
      } else {
        alert("Incorrect code!");
      }
    }

    let currentUser = "";
    let allMessages = [];

    function renderMessages() {
      const messagesDiv = document.getElementById("messages");
      messagesDiv.innerHTML = "";
      allMessages.forEach(entry => {
        if (entry.message && entry.message.trim()) {
          const msgDiv = document.createElement("div");
          msgDiv.className = "msg";
          if (entry.message.startsWith(currentUser + ":")) {
            msgDiv.classList.add("self");
          }
          msgDiv.textContent = entry.message;

          // timestamp
          const ts = document.createElement("div");
          ts.className = "timestamp";
          ts.textContent = new Date(entry.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
          msgDiv.appendChild(ts);

          messagesDiv.appendChild(msgDiv);
        }
      });
      // scroll to bottom
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function enterChat() {
      const user = document.getElementById("username").value.trim();
      if (!user) {
        alert("Please enter a username");
        return;
      }
      currentUser = user;
      document.getElementById("username-screen").style.display = "none";
      document.getElementById("chat").style.display = "flex";
      fetchMessages();
    }

    async function fetchMessages() {
      try {
        const res = await fetch("/api/messages");
        const data = await res.json();
        allMessages = data;
        renderMessages();
      } catch (err) {
        console.error("Failed to fetch messages:", err);
      }
    }

    async function sendMessage() {
      const msgInput = document.getElementById("message");
      const msg = msgInput.value.trim();
      if (!msg) return;

      const entry = {
        message: currentUser + ": " + msg,
        timestamp: Date.now()
      };

      await fetch("/api/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(entry)
      });

      msgInput.value = "";
      fetchMessages(); // reload chat
    }

    // Refresh chat every 3s
    setInterval(fetchMessages, 3000);

    // Mobile return key = send
    document.getElementById("message").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
